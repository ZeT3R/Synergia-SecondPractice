<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="/static/css/style.css"></head>
<body>
    <div class="container">
        <h2>Вход / Регистрация</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Логин" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <button type="button" onclick="handleAuth('login')">Войти</button>
            <button type="button" onclick="handleAuth('register')" style="background:#5bc0de">Регистрация</button>
        </form>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
